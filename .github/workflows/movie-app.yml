name: MovieApp CI

on:
  push:
    branches: [ main, feat/migration-to-modern-app ]
    paths:
      - 'MovieApp/**'
      - '.github/workflows/movie-app.yml'
  pull_request:
    branches: [ main, feat/migration-to-modern-app ]
    paths:
      - 'MovieApp/**'
      - '.github/workflows/movie-app.yml'

jobs:
  test:
    name: Lint, Type-check, Build, and E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MovieApp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: MovieApp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Run lint
        run: pnpm run lint

      - name: Run type-check
        run: pnpm run type-check

      - name: Build
        run: pnpm run build
        env:
          VITE_TMDB_BEARER_TOKEN: ${{ secrets.VITE_TMDB_BEARER_TOKEN }}

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm run test:e2e
        env:
          VITE_TMDB_BEARER_TOKEN: ${{ secrets.VITE_TMDB_BEARER_TOKEN }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: MovieApp/playwright-report/
          retention-days: 30
